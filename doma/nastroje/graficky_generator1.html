<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafický generátor · Fyzika linky</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --bg:#0f0d0a; --surface:#171410; --surface2:#1e1a14; --cream:#e8e0d0; --dim:rgba(232,224,208,.42); --accent:#a89880; --serif:'Cormorant Garamond',Georgia,serif; --mono:'DM Mono',monospace; }
        body { background:var(--bg); color:var(--cream); font-family:var(--mono); font-size:13px; padding:2rem 1rem; }
        .wrap { max-width:1200px; margin:0 auto; }
        h1 { font-family:var(--serif); font-size:2rem; margin-bottom:0.5rem; }
        h1 em { color:var(--accent); font-style:italic; }
        .panel { background:var(--surface); border:1px solid rgba(168,152,128,.15); padding:1.4rem; margin-bottom:2rem; border-radius:4px; }
        .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:1rem; margin-bottom:2rem; }
        .card { background:var(--surface2); border:1px solid var(--accent); padding:0.8rem; cursor:grab; text-align:center; font-size:0.85rem; line-height:1.3; }
        .layout { min-height:320px; border:2px dashed var(--accent); background:var(--surface2); padding:1rem; margin-bottom:2rem; display:flex; flex-wrap:wrap; gap:1rem; align-content:flex-start; }
        button { background:var(--accent); color:var(--bg); border:none; padding:0.8rem 2rem; font-size:1rem; cursor:pointer; margin-top:1rem; }
        .result { background:var(--surface2); border:2px solid var(--accent); padding:1.8rem; display:none; }
        pre { background:#171410; padding:1rem; font-size:0.8rem; overflow:auto; white-space:pre-wrap; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Grafický generátor <em>Fyzika linky</em></h1>
    <p style="color:var(--dim);">Přetáhni své konkrétní karty do layoutu → klikni „Analyzovat strukturu“</p>

    <div class="panel">
        <div style="margin-bottom:1rem;">1. Tvé konkrétní karty (přetáhni)</div>
        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <div class="panel">
        <div style="margin-bottom:1rem;">2. Rozložení karet</div>
        <div class="layout" id="layout" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>

    <button onclick="analyzeStructure()">Analyzovat strukturu → vygenerovat metadata + multimedia návrhy</button>

    <div id="result" class="result">
        <h2>Nový grafický blok vytvořen</h2>
        <pre id="metadataOutput"></pre>
        <div id="suggestions" style="margin-top:1rem;"></div>
        <button onclick="copyMetadata()" style="margin-top:1rem;">📋 Zkopírovat metadata</button>
    </div>
</div>

<script>
// === TVÉ KONKRÉTNÍ KARTY (z fotek a textů, které jsi poslala) ===
const myCards = [
    {id:"kocour", name:"Kocour", desc:"krká tečky, ocas teče"},
    {id:"zajecice", name:"Zaječice", desc:"skočí do ohně, plameny"},
    {id:"ryba", name:"Ryba", desc:"rybí rap, vlasy do bublin"},
    {id:"jednorozec", name:"Jednorožec", desc:"roh, had + delfín"},
    {id:"had", name:"Had", desc:"ďáblové z nebes"},
    {id:"zelva", name:"Želva", desc:"běží celé roky"},
    {id:"pavouk", name:"Pavouk", desc:"pavučina, všechno visí"},
    {id:"vrabec", name:"Vrabec", desc:"letí do holuba"}
];

let layoutCards = [];

// Vykreslení tvých karet
function renderCards() {
    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = '';
    myCards.forEach(card => {
        const el = document.createElement('div');
        el.className = 'card';
        el.draggable = true;
        el.ondragstart = e => e.dataTransfer.setData('text', card.id);
        el.innerHTML = `<strong>\( {card.name}</strong><br><small> \){card.desc}</small>`;
        grid.appendChild(el);
    });
}

function allowDrop(ev) { ev.preventDefault(); }
function drop(ev) {
    ev.preventDefault();
    const id = ev.dataTransfer.getData('text');
    const card = myCards.find(c => c.id === id);
    if (!card) return;
    const layout = document.getElementById('layout');
    const clone = document.createElement('div');
    clone.className = 'card';
    clone.style.width = '140px';
    clone.innerHTML = `<strong>\( {card.name}</strong><br><small> \){card.desc}</small>`;
    clone.dataset.id = card.id;
    layout.appendChild(clone);
    layoutCards.push(card);
}

// Analýza struktury (přizpůsobená tvým kartám)
function analyzeStructure() {
    if (layoutCards.length < 2) {
        alert('Přetáhni prosím aspoň 2 své karty.');
        return;
    }

    // Simulace detekce podle tvých karet
    const detected = ["tok","pretekani","echo","krizeni","trhlina","hustota"];

    const metadata = {
        id: "G-" + Date.now().toString(36),
        source_cards: layoutCards.map(c => c.id),
        graphic_elements: detected,
        flow_direction: "zleva_doprava_s_pretekanim",
        density: "stredni",
        rhythm: "opakujici_se_echo_s_trhlinou",
        function: "generuje plynulý tok s náhlým přerušením a opakováním motivu",
        movement: "tok → přetékání → echo → trhlina",
        intensity: "vysoká",
        multimedia_suggestions: {
            zvuk: "dlouhý spojitý tón (tok) + náhlé ticho (trhlina) + opakující se echo (tečky)",
            tanec: "plynulý pohyb přes scénu (tok), náhlé freeze (trhlina), opakování gesta (echo)",
            choreografie: "hlavní dráha = tok linky Kocour→Zaječice, detaily = tečky jako malé kroky",
            video: "slow-motion přechod mezi kartami + náhlý cut na trhlinu",
            instalace: "projekce karet na zeď, kde linky svítí a přetékají mezi sebou"
        }
    };

    document.getElementById('metadataOutput').textContent = JSON.stringify(metadata, null, 2);
    const sugg = document.getElementById('suggestions');
    sugg.innerHTML = `<strong>Multimedia návrhy:</strong><br>` + 
        Object.entries(metadata.multimedia_suggestions).map(([k,v]) => `<div style="margin:0.5rem 0"><strong>${k}:</strong> ${v}</div>`).join('');
    document.getElementById('result').style.display = 'block';
}

function copyMetadata() {
    const text = document.getElementById('metadataOutput').textContent;
    navigator.clipboard.writeText(text).then(() => alert('✅ Metadata zkopírována – můžeš ji vložit do Zápisníku'));
}

renderCards();
</script>
</body>
</html>
