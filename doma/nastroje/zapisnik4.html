// 3. DETEKTORY (zjednodušené – pro ukázku)
// ------------------------------------------------------------
function detectElipsy(text) {
  const sentences = text.split(/[.!?…]+/).filter(s=>s.trim().length>0);
  return sentences.filter(s => {
    const words = s.trim().split(/\s+/);
    return words.length <= 3 && !s.match(/\b(l|la|lo|li|ly|t)\b/);
  }).length;
}
function detectVyčet(text) { return (text.match(/[^,]+,[^,]+,[^,]+/g)||[]).length; }
function detectGradace(text) { return (text.match(/\b(\w+)(ější|ější|ější|ší|ší|ější|ější|ejší|ejší)\b/gi)||[]).length; }
function detectKulturniReference(text) { return (text.match(/\b(emo|gospel|chanson|sleva|výprodej|reklama|marketing)\b/gi)||[]).length; }
function detectIronie(text) { return (text.match(/\b(samozřejmě|ovšem|jistě|pochopitelně)\b/gi)||[]).length; }
function detectNeologismus(text) { return (text.match(/\b(rapujou|sebe-klam|motýlkovat)\b/gi)||[]).length; }
function detectParadox(text) { return (text.match(/\b(paradox|ale přesto|a přece)\b/gi)||[]).length; }
function detectOtazka(text) { return (text.match(/\?/g)||[]).length; }
function detectAforismus(text) {
  const sentences = text.split(/[.!?]+/).filter(s=>s.trim().length>0);
  return sentences.filter(s => s.trim().split(/\s+/).length <= 12 && /\b(smysl|pravda|bytí|důležité|stačí)\b/i.test(s)).length;
}
function detectJednoduchaVeta(text) {
  const sentences = text.split(/[.!?…]+/).filter(s=>s.trim().length>0);
  return sentences.filter(s => s.trim().split(/\s+/).length <= 5).length;
}
function detectPersonifikace(text) { return (text.match(/\b(smutek|soucit|radost|krokodýl)\s+(řekl|zeptal|usmál|plakal|vysvětloval)\b/gi)||[]).length; }
function detectApostrofa(text) { return (text.match(/\b(představte si|buďte|podívej se)\b/gi)||[]).length; }
function detectFyzikalizace(text) { return (text.match(/\b(slova|věta|jazyk|řeč)\s+(má|nese|váží|teče|padá)\b/gi)||[]).length; }
function detectMetafora(text) { return (text.match(/\b(\w+)\s+(je|jsou|byl|byla)\s+(\w+)\b/gi)||[]).length; }
function detectSymbol(text) { return (text.match(/\b(krokodýl|slzy|rohlík)\b/gi)||[]).length; }
function detectRetezovaMetafora(text) { return (text.match(/\b(\w+)\s+je\s+(\w+)\s+a\s+(\w+)\s+je\s+(\w+)\b/gi)||[]).length; }
function detectFragment(text) { const s = text.split(/[.!?…]+/).filter(s=>s.trim().length>0); return s.filter(s => s.trim().split(/\s+/).length <= 2).length; }
function detectApoziopeze(text) { return (text.match(/\.\.\.|…/g)||[]).length; }
function detectVolnaAsociace(text) { return (text.match(/\b(najednou|a pak|mimochodem)\b/gi)||[]).length; }
function detectVnitrniHlas(text) { return (text.match(/\b(cítím|myslím|uvědomuji|vím)\b/gi)||[]).length; }
function detectPrvniOsoba(text) { return (text.match(/\b(já|jsem|mi|mě|můj|my|nás)\b/gi)||[]).length; }
function detectSebereflexe(text) { return (text.match(/\b(uvědomil|pochopil|zjistil|přišel o)\b/gi)||[]).length; }
function detectKontrast(text) { return (text.match(/\b(ale|naopak|avšak|přesto)\b/gi)||[]).length; }
function detectHyperbola(text) { return (text.match(/\b(strašně|hrozně|neuvěřitelně|vždy|nikdy)\b/gi)||[]).length; }
function detectAbsurdniObraz(text) { return (text.match(/\b(motýl|krokodýl|rohlík)\s+(v|na)\s+(polívka|lednička|políčko)\b/gi)||[]).length; }
function detectNadsazka(text) { return detectHyperbola(text); }
function detectNelogickeSpojeni(text) { return (text.match(/\b(slzy\s+v\s+akci|pláč\s+v\s+letáku)\b/gi)||[]).length; }
function detectSnovyObraz(text) { return (text.match(/\b(sen|zdálo|magický|podivný)\b/gi)||[]).length; }
function detectSynestezie(text) { return (text.match(/\b(barva|zvuk|vůně|chuť)\s+[a-záčďéěíňóřšťůúýž]+\b/gi)||[]).length; }
function detectMetamorfoza(text) { return (text.match(/\b(proměnil|převlékl|změnil se)\b/gi)||[]).length; }

const figureDetectors = {
  vycet: detectVyčet,
  elipsa: detectElipsy,
  gradace: detectGradace,
  kulturni_reference: detectKulturniReference,
  ironie: detectIronie,
  neologismus: detectNeologismus,
  paradox: detectParadox,
  otazka: detectOtazka,
  aforismus: detectAforismus,
  jednoducha_veta: detectJednoduchaVeta,
  personifikace: detectPersonifikace,
  apostrofa: detectApostrofa,
  fyzikalizace: detectFyzikalizace,
  metafora: detectMetafora,
  symbol: detectSymbol,
  retezova_metafora: detectRetezovaMetafora,
  fragment: detectFragment,
  apoziopeze: detectApoziopeze,
  volna_asociace: detectVolnaAsociace,
  vnitrni_hlas: detectVnitrniHlas,
  prvni_osoba: detectPrvniOsoba,
  sebereflexe: detectSebereflexe,
  kontrast: detectKontrast,
  hyperbola: detectHyperbola,
  absurdni_obraz: detectAbsurdniObraz,
  nadsazka: detectNadsazka,
  nelogicke_spojeni: detectNelogickeSpojeni,
  snovy_obraz: detectSnovyObraz,
  synestezie: detectSynestezie,
  metamorfoza: detectMetamorfoza
};

// ------------------------------------------------------------
// 4. ANALÝZA TEXTU (12 úhlů a kontrola figur)
// ------------------------------------------------------------
const angleProfile = {
  "Analytický": ["vycet", "elipsa", "gradace"],
  "Kulturní": ["kulturni_reference", "ironie", "neologismus"],
  "Filozofický": ["paradox", "otazka", "aforismus"],
  "Naivní": ["jednoducha_veta", "personifikace", "apostrofa"],
  "Jazykový": ["fyzikalizace", "neologismus", "metafora"],
  "Metaforický": ["metafora", "symbol", "retezova_metafora"],
  "Asociační": ["fragment", "apoziopeze", "volna_asociace"],
  "Introspektivní": ["vnitrni_hlas", "prvni_osoba", "sebereflexe"],
  "Ironický": ["ironie", "kontrast", "imperativ"],
  "Groteskní": ["hyperbola", "absurdni_obraz", "nadsazka"],
  "Absurdní": ["paradox", "fragment", "nelogicke_spojeni"],
  "Surrealistický": ["snovy_obraz", "synestezie", "metamorfoza"]
};

function analyzeText(text) {
  const angleScores = {};
  for (let [angle, figs] of Object.entries(angleProfile)) {
    let score = 0;
    for (let fig of figs) {
      if (figureDetectors[fig]) score += figureDetectors[fig](text);
    }
    angleScores[angle] = score;
  }
  const total = Object.values(angleScores).reduce((a,b)=>a+b,0) || 1;
  const anglePercent = {};
  for (let angle in angleScores) {
    anglePercent[angle] = (angleScores[angle] / total * 100).toFixed(1);
  }
  return anglePercent;
}

function checkExpectedFigures(text, expectedList) {
  const result = {};
  for (let fig of expectedList) {
    if (figureDetectors[fig]) {
      result[fig] = figureDetectors[fig](text);
    } else {
      result[fig] = 0;
    }
  }
  return result;
}

// ------------------------------------------------------------
// 5. SPRÁVA ZÁZNAMŮ (localStorage, mapa 'main')
// ------------------------------------------------------------
const STORAGE_KEY = 'chcesmys_zapisnik';
const MAP_ID = 'main';

function loadEntries() {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (!data[MAP_ID]) {
      data[MAP_ID] = { name: 'Zápisník mezer', popis: '', entries: [], created: Date.now() };
    }
    return data[MAP_ID].entries || [];
  } catch(e) { return []; }
}

function saveEntry(entry) {
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if (!data[MAP_ID]) data[MAP_ID] = { name: 'Zápisník mezer', popis: '', entries: [], created: Date.now() };
  data[MAP_ID].entries.unshift(entry);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function deleteEntry(id) {
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if (data[MAP_ID]) {
    data[MAP_ID].entries = data[MAP_ID].entries.filter(e => e.id !== id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }
  renderHistory();
}

function clearAllEntries() {
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if (data[MAP_ID]) data[MAP_ID].entries = [];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  renderHistory();
}

function exportAll() {
  const entries = loadEntries();
  const blob = new Blob([JSON.stringify(entries, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `zapisnik_export_${new Date().toISOString().slice(0,19)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ------------------------------------------------------------
// 6. UI A INICIALIZACE
// ------------------------------------------------------------
const cardSelect = document.getElementById('cardSelect');
const angleSelect = document.getElementById('angleSelect');
const taskDisplay = document.getElementById('taskDisplay');
const userText = document.getElementById('userText');
const analysisResult = document.getElementById('analysisResult');
const historyList = document.getElementById('historyList');
const loadTaskBtn = document.getElementById('loadTaskBtn');
const analyzeBtn = document.getElementById('analyzeBtn');
const saveBtn = document.getElementById('saveBtn');
const clearBtn = document.getElementById('clearBtn');
const exportAllBtn = document.getElementById('exportAllBtn');
const clearHistoryBtn = document.getElementById('clearHistoryBtn');
const figuresList = document.getElementById('figuresList');

let currentCard = null;
let currentAngle = null;
let currentTaskText = null;
let currentExpectedFigs = [];

function populateCards() {
  cardSelect.innerHTML = '<option value="">-- vyber kartu --</option>';
  for (let card in tasksData) {
    cardSelect.innerHTML += `<option value="${card}">${tasksData[card].name}</option>`;
  }
}
function populateAngles(card) {
  angleSelect.innerHTML = '<option value="">-- vyber úhel --</option>';
  if (!card || !tasksData[card]) return;
  const angles = tasksData[card].angles;
  for (let deg in angles) {
    angleSelect.innerHTML += `<option value="${deg}">${deg}° ${angles[deg].name}</option>`;
  }
}

function loadTask() {
  const card = cardSelect.value;
  const deg = angleSelect.value;
  if (!card || !deg || !tasksData[card] || !tasksData[card].angles[deg]) return;
  currentCard = card;
  currentAngle = parseInt(deg);
  const angleData = tasksData[card].angles[deg];
  currentTaskText = angleData.task;
  currentExpectedFigs = angleData.expected || [];
  taskDisplay.innerHTML = `<strong>${card} – ${deg}° ${angleData.name}</strong><br>${currentTaskText}`;
  taskDisplay.style.display = 'block';
}

function renderHistory() {
  const entries = loadEntries();
  if (entries.length === 0) {
    historyList.innerHTML = '<p style="color:var(--dim); font-style:italic;">Zatím žádné záznamy.</p>';
    return;
  }
  let html = '';
  entries.forEach(e => {
    const date = new Date(e.ts).toLocaleString('cs-CZ');
    const preview = (e.text || '').slice(0, 60) + (e.text?.length > 60 ? '…' : '');
    html += `
      <div class="history-item" data-id="${e.id}">
        <div class="history-meta">
          <span>${e.karta || '?'} ${e.uhel !== undefined ? e.uhel+'°' : ''} – ${e.nazev || 'volný'}</span>
          <span>${date}</span>
        </div>
        <div class="history-preview">${escapeHtml(preview)}</div>
      </div>`;
  });
  historyList.innerHTML = html;
  document.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const entry = loadEntries().find(e => e.id === id);
      if (entry) {
        userText.value = entry.text;
        if (entry.karta && entry.uhel !== undefined) {
          cardSelect.value = entry.karta;
          populateAngles(entry.karta);
          angleSelect.value = entry.uhel;
          loadTask();
        } else {
          taskDisplay.style.display = 'none';
          currentCard = null;
          currentAngle = null;
          currentTaskText = null;
          currentExpectedFigs = [];
        }
        analyzeTextAndDisplay();
      }
    });
  });
}

function analyzeTextAndDisplay() {
  const text = userText.value.trim();
  if (!text) { alert('Napište nejprve text.'); return; }
  const anglePercent = analyzeText(text);
  let resultHtml = `<h4 style="margin-bottom:0.5rem;">📊 Profil 12 úhlů</h4><div class="angle-bars">`;
  for (let [angle, percent] of Object.entries(anglePercent)) {
    resultHtml += `
      <div class="angle-bar-item">
        <div class="angle-bar-label">${angle}</div>
        <div class="angle-bar-bg"><div class="angle-bar-fill" style="width:${percent}%"></div></div>
        <div>${percent}%</div>
      </div>`;
  }
  resultHtml += `</div>`;
  if (currentExpectedFigs && currentExpectedFigs.length > 0) {
    const figResults = checkExpectedFigures(text, currentExpectedFigs);
    resultHtml += `<div class="figure-check"><strong>Kontrola úkolu:</strong> `;
    const totalFigs = currentExpectedFigs.length;
    const matched = Object.values(figResults).filter(v => v > 0).length;
    resultHtml += `${matched} / ${totalFigs} očekávaných figur nalezeno.`;
    if (matched === totalFigs) resultHtml += ` ✅ Skvěle! Úkol splněn.`;
    else resultHtml += ` ⚠️ Zkuste doplnit chybějící figury.`;
    resultHtml += `<br><span style="font-size:0.7rem;">Požadované figury: ${currentExpectedFigs.join(', ')}</span>`;
    resultHtml += `</div>`;
  }
  analysisResult.innerHTML = resultHtml;
  analysisResult.classList.add('visible');
}

function saveCurrent() {
  const text = userText.value.trim();
  if (!text) { alert('Napište nejprve text.'); return; }
  const anglePercent = analyzeText(text);
  const entry = {
    id: 'e_' + Date.now(),
    ts: Date.now(),
    text: text,
    angleProfile: anglePercent,
    karta: currentCard || null,
    uhel: currentAngle !== null ? currentAngle : null,
    nazev: currentCard && currentAngle !== null ? tasksData[currentCard]?.angles[currentAngle]?.name : null,
    poeticky: null
  };
  saveEntry(entry);
  renderHistory();
  alert('Text uložen.');
}

function renderFiguresLibrary() {
  let html = '<div class="fig-encyclopedia">';
  for (let [key, fig] of Object.entries(figureEncyclopedia)) {
    html += `
      <details>
        <summary>${fig.name}</summary>
        <p><strong>Definice:</strong> ${fig.desc}</p>
        <p><strong>Psychologie:</strong> ${fig.psych}</p>
        <div class="example">Příklad: ${fig.ex}</div>
      </details>`;
  }
  html += '</div>';
  figuresList.innerHTML = html;
}

function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Inicializace
populateCards();
renderFiguresLibrary();
renderHistory();

cardSelect.addEventListener('change', () => {
  populateAngles(cardSelect.value);
  taskDisplay.style.display = 'none';
  currentCard = null;
  currentAngle = null;
});
loadTaskBtn.addEventListener('click', loadTask);
analyzeBtn.addEventListener('click', analyzeTextAndDisplay);
saveBtn.addEventListener('click', saveCurrent);
clearBtn.addEventListener('click', () => { userText.value = ''; analysisResult.classList.remove('visible'); });
exportAllBtn.addEventListener('click', exportAll);
clearHistoryBtn.addEventListener('click', () => { if(confirm('Smazat celou historii?')) clearAllEntries(); });

// URL parametry pro otevření z karty
const urlParams = new URLSearchParams(window.location.search);
const cardParam = urlParams.get('card');
const angleParam = urlParams.get('angle');
if (cardParam && angleParam !== null && tasksData[cardParam] && tasksData[cardParam].angles[angleParam]) {
  cardSelect.value = cardParam;
  populateAngles(cardParam);
  angleSelect.value = angleParam;
  loadTask();
}
</script>
</body>
</html>
