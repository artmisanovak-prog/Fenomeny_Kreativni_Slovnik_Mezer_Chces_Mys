<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>detektor úhlů pohledu — 12 perspektiv</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      line-height: 1.7;
      padding: 30px 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    h1 { 
      font-size: 2.4rem; 
      font-weight: 300; 
      border-bottom: 1px solid #333; 
      padding-bottom: 15px; 
      margin-bottom: 25px;
      letter-spacing: -1px;
    }
    h1 span {
      color: #a0a0a0;
      font-size: 1rem;
      margin-left: 15px;
    }
    textarea {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      color: #ddd;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      padding: 18px;
      margin: 20px 0;
      border-radius: 0;
      resize: vertical;
    }
    button {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #444;
      padding: 14px 28px;
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      cursor: pointer;
      margin-bottom: 30px;
      transition: all 0.2s;
    }
    button:hover {
      background: #2a2a2a;
      border-color: #888;
    }
    .results {
      border: 1px solid #333;
      padding: 25px;
      background: #0f0f0f;
      margin-top: 20px;
    }
    .angle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #222;
    }
    .angle-name {
      font-weight: bold;
      color: #ccc;
      width: 200px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .angle-name:hover {
      color: #d4b48c;
      text-decoration: underline;
    }
    .angle-score {
      width: 80px;
      text-align: right;
      font-family: monospace;
    }
    .angle-bar {
      flex: 1;
      height: 10px;
      background: #2a2a2a;
      margin-left: 20px;
      border-radius: 5px;
      overflow: hidden;
    }
    .angle-fill {
      height: 100%;
      background: #8a6d3b;
      width: 0%;
    }
    .top-angle {
      background: #1e2a1e;
      padding: 15px;
      margin: 20px 0;
      border-left: 4px solid #8a6d3b;
    }
    .figures-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 15px;
      margin: 15px 0 10px;
    }
    .figure-tag {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      padding: 4px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 20px;
    }
    .figure-tag:hover {
      background: #2a2a2a;
      border-color: #8a6d3b;
      color: #d4b48c;
    }
    .figure-tag.active {
      background: #2a3a2a;
      border-color: #8a6d3b;
      color: #e0e0e0;
    }
    .detail-panel {
      margin-top: 25px;
      border-top: 1px solid #333;
      padding-top: 20px;
    }
    .detail-header {
      font-size: 1.1rem;
      margin-bottom: 10px;
      color: #ccc;
    }
    .detail-description {
      background: #111;
      padding: 12px 15px;
      border-left: 2px solid #8a6d3b;
      margin-bottom: 15px;
      font-style: italic;
    }
    .occurrences {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #2a2a2a;
      background: #0c0c0c;
    }
    .occurrence-item {
      padding: 8px 12px;
      border-bottom: 1px solid #222;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.9rem;
    }
    .occurrence-item:hover {
      background: #1a2a1a;
    }
    .occurrence-item .context {
      color: #aaa;
      font-size: 0.8rem;
      margin-top: 2px;
    }
    .footer {
      margin-top: 50px;
      color: #444;
      font-size: 0.8rem;
      text-align: right;
    }
    .highlight {
      background-color: #4a3a2a;
      color: #fff;
      transition: background-color 0.3s;
    }
  </style>
</head>
<body>
  <h1>detektor úhlů pohledu <span>— 12 perspektiv</span></h1>
  <p style="color:#aaa; max-width:700px; margin-bottom:20px;">
    Na základě jazykových figur (elipsy, paradoxy, personifikace…) text přiřadí 
    k jednomu z 12 kognitivních úhlů. Kliknutím na figuru zobrazíte, kde přesně se v textu nachází.
  </p>

  <textarea id="inputText" rows="10" placeholder="Sem vlož libovolný text – třeba úryvek z pohádky, vlastní psaní, cokoli..."></textarea>
  <button id="analyzeBtn">který úhel to vidí?</button>

  <div id="results" class="results" style="display: none;"></div>
  <div id="detailPanel" class="detail-panel" style="display: none;"></div>

  <footer class="footer">
    detektor úhlů · součást projektu Chceš myš? · © Michaela Nováková 2026
  </footer>

  <script>
    // =====================================================
    // 1. SLOVNÍKY POPISŮ – pro figury a úhly
    // =====================================================
    const popisyFigur = {
      elipsa: 'Vynechání části věty (nejčastěji slovesa). Vytváří napětí, zkratkovitost, nutí čtenáře domýšlet.',
      anafora: 'Opakování stejného slova na začátku po sobě jdoucích vět. Vytváří rytmus a zdůrazňuje myšlenku.',
      repetice: 'Opakování stejného slova v krátkém úseku. Zvyšuje důraz, může signalizovat fixaci.',
      negace: 'Použití záporu (ne, není, nikdo). Vymezuje, co věc není, často přesnější než pozitivní definice.',
      fragment: 'Krátký, izolovaný úsek, který není úplnou větou. Vytváří dojem rozpadu, naléhavosti, nedourčenosti.',
      gradace: 'Stupňování – řazení výrazů od nejslabšího po nejsilnější (nebo naopak). Vytváří napětí a dynamiku.',
      metafora: 'Přenos významu na základě vnější podobnosti. „X je Y“, kde Y není běžná vlastnost X.',
      personifikace: 'Přiřazení lidských vlastností neživým věcem, zvířatům nebo abstraktním pojmům.',
      fyzikalizace: 'Zacházení s jazykem (slovy, větami, myšlenkami) jako s hmotnými objekty – padají, visí, tečou.',
      paradox: 'Zdánlivě nesmyslné tvrzení, které může obsahovat pravdu; logický rozpor.',
      ironie: 'Vyjádření opaku toho, co se myslí. Často signalizována kontrastem nebo nadsázkou.',
      hyperbola: 'Záměrné přehánění pro zdůraznění – nadsázka.',
      apoziopeze: 'Náhlé přerušení výpovědi, nedokončená věta (často tři tečky nebo pomlčka).',
      apostrofa: 'Oslovení nepřítomné osoby, abstraktní entity nebo přímo čtenáře.'
    };

    const popisyUhlu = {
      '0° analytický': 'Soustředí se na fakta, čísla, přesné údaje. Používá elipsy, výčty, anafory. Rozkládá svět na součásti.',
      '30° kulturní': 'Pracuje s kulturními odkazy, mýty, ustálenými frázemi. Čerpá z kolektivní paměti.',
      '60° filozofický': 'Klade otázky po smyslu, existenci, pravdě. Typické jsou paradoxy, aforismy, kontrasty.',
      '90° naivní': 'Dětský, jednoduchý pohled. Používá přímá oslovení, zdrobněliny, personifikace.',
      '120° jazykový': 'Zabývá se jazykem samotným – jeho hmotou, hrou, strukturou. Fyzikalizace, neologismy, chiasmy.',
      '150° metaforický': 'Vidí světy v obrazech a symbolech. Vládnou mu metafory, personifikace, přirovnání.',
      '180° asociační': 'Volně propojuje myšlenky, skáče od jednoho k druhému. Fragmenty, odskoky, proud vědomí.',
      '210° introspektivní': 'Obrácený dovnitř – pocity, pochybnosti, vnitřní monology. Častá první osoba.',
      '240° ironický': 'Nadhled, výsměch, převracení hodnot. Kombinuje paradoxy, kontrasty a nadsázku.',
      '270° groteskní': 'Přehnaný, absurdní, často děsivě komický. Hyperbola, onomatopoie, extrémní obrazy.',
      '300° absurdní': 'Svět, kde neplatí logika. Fragmenty, nelogická spojení, rozpad syntaxe.',
      '330° surrealistický': 'Snová logika, prolínání realit, metamorfózy. Obrazy bez vysvětlení.'
    };

    // =====================================================
    // 2. DETEKTORY FIGUR – vracejí pole nálezů s kontextem
    // =====================================================
    function detekujElipsy(text) {
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        const slova = veta.split(/\s+/);
        if (slova.length <= 3) {
          const posledni = slova[slova.length-1].toLowerCase();
          if (!posledni.match(/(l|la|lo|li|ly|t)$/)) {
            nalezy.push({ veta, index: idx, kontext: veta.substring(0, 60) });
          }
        }
      });
      return nalezy;
    }

    function detekujAnaforu(text) {
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      for (let i = 0; i < vety.length-1; i++) {
        const prvni1 = vety[i].split(/\s+/)[0] || '';
        const prvni2 = vety[i+1].split(/\s+/)[0] || '';
        if (prvni1 && prvni2 && prvni1.toLowerCase() === prvni2.toLowerCase()) {
          nalezy.push({ veta: vety[i] + ' … ' + vety[i+1], index: i, kontext: prvni1 });
        }
      }
      return nalezy;
    }

    function detekujRepetici(text) {
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        const slova = veta.toLowerCase().split(/\s+/);
        const frekvence = {};
        slova.forEach(s => { if (s.length>2) frekvence[s] = (frekvence[s]||0)+1; });
        for (let f in frekvence) {
          if (frekvence[f] >= 3) {
            nalezy.push({ veta, index: idx, kontext: `opakování "${f}"` });
            break;
          }
        }
      });
      return nalezy;
    }

    function detekujNegaci(text) {
      const neg = ['ne','není','nejsou','nebyl','nebyla','nebylo','nemá','nikdo','nic','žádný'];
      const nalezy = [];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      vety.forEach((veta, idx) => {
        let found = false;
        neg.forEach(n => {
          if (veta.toLowerCase().includes(n)) found = true;
        });
        if (found) nalezy.push({ veta, index: idx, kontext: 'obsahuje negaci' });
      });
      return nalezy;
    }

    function detekujFragment(text) {
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        const slova = veta.split(/\s+/);
        if (slova.length <= 2 && veta.length>0) {
          nalezy.push({ veta, index: idx, kontext: 'krátký fragment' });
        }
      });
      return nalezy;
    }

    function detekujGradaci(text) {
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        const match = veta.match(/\b(\w+)(ější|ější|ější|ší|ší|ější|ější|ejší|ejší)\b/gi);
        if (match && match.length >= 2) {
          nalezy.push({ veta, index: idx, kontext: 'gradace: ' + match.join(', ') });
        }
      });
      return nalezy;
    }

    function detekujMetaforu(text) {
      const metaKlic = ['je','jsou','byl','byla','byli','byly'];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        metaKlic.forEach(m => {
          const regex = new RegExp('\\b(\\w+)\\s+'+m+'\\s+(\\w+)','gi');
          const match = regex.exec(veta);
          if (match) nalezy.push({ veta, index: idx, kontext: `${match[1]} ${m} ${match[2]}` });
        });
      });
      return nalezy;
    }

    function detekujPersonifikaci(text) {
      const lidskaSlovesa = ['mluví','řekl','říká','zeptala','odpověděla','přemýšlí','myslí','cítí','směje','pláče','zapisuje','počítá'];
      const nezive = ['čas','den','noc','tma','světlo','stín','voda','vítr','oheň','země','nebe','strom','kámen','řeka'];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        nezive.forEach(n => {
          const regex = new RegExp('\\b'+n+'\\s+(\\w+)','gi');
          const match = regex.exec(veta);
          if (match && lidskaSlovesa.includes(match[1].toLowerCase())) {
            nalezy.push({ veta, index: idx, kontext: `${n} ${match[1]}` });
          }
        });
      });
      return nalezy;
    }

    function detekujFyzikalizaci(text) {
      const abstrakt = ['slovo','věta','řeč','jazyk','myšlenka','otázka','odpověď','význam','smysl','láska','strach','smutek'];
      const fyzSlovesa = ['padá','letí','teče','visí','stoupá','klesá','tuhne','tvrdne','měkne','spolkl','krká','polyká'];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        abstrakt.forEach(a => {
          fyzSlovesa.forEach(f => {
            const regex = new RegExp('\\b'+a+'\\s+'+f+'\\b|\\b'+f+'\\s+'+a+'\\b','gi');
            if (regex.test(veta)) nalezy.push({ veta, index: idx, kontext: `${a} / ${f}` });
          });
        });
      });
      return nalezy;
    }

    function detekujParadox(text) {
      const vzorce = [
        /\b(\w+)\s+(a přesto|a přece|ale přesto|ale stejně)\s+(ne-?\w+)/gi,
        /\b(živý|živá|živé)\s+(mrtvola|mrtvý|neživý)\b/gi,
        /\b(tma|temnota)\s+(světlo|záře|jas)\b|\b(světlo)\s+(tma|temnota)\b/gi
      ];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        vzorce.forEach(v => {
          if (v.test(veta)) nalezy.push({ veta, index: idx, kontext: 'paradox' });
        });
      });
      return nalezy;
    }

    function detekujIronii(text) {
      const ironSlova = ['samozřejmě','jasně','jistě','ovšem','pochopitelně'];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        ironSlova.forEach(i => {
          if (veta.toLowerCase().includes(i)) nalezy.push({ veta, index: idx, kontext: i });
        });
      });
      return nalezy;
    }

    function detekujHyperbolu(text) {
      const slova = ['všechno','nikdo','nikdy','vždycky','absolutně','nekonečný','obrovský','neskutečný'];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        slova.forEach(h => {
          if (veta.toLowerCase().includes(h)) nalezy.push({ veta, index: idx, kontext: h });
        });
      });
      return nalezy;
    }

    function detekujApoziopezi(text) {
      const vety = text.split(/(?<=[.!?…])\s+/);
      const nalezy = [];
      vety.forEach((segment, idx) => {
        if (segment.includes('…') || segment.includes('...') || segment.includes('–')) {
          nalezy.push({ veta: segment, index: idx, kontext: 'přerušení' });
        }
      });
      return nalezy;
    }

    function detekujApostrofu(text) {
      const osloveni = ['představte si','představ si','věřte mi','věř mi','poslouchejte','poslouchej','podívejte se','podívej se'];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        osloveni.forEach(o => {
          if (veta.toLowerCase().includes(o)) nalezy.push({ veta, index: idx, kontext: o });
        });
      });
      return nalezy;
    }

    // mapa detektorů
    const detektory = {
      elipsa: detekujElipsy,
      anafora: detekujAnaforu,
      repetice: detekujRepetici,
      negace: detekujNegaci,
      fragment: detekujFragment,
      gradace: detekujGradaci,
      metafora: detekujMetaforu,
      personifikace: detekujPersonifikaci,
      fyzikalizace: detekujFyzikalizaci,
      paradox: detekujParadox,
      ironie: detekujIronii,
      hyperbola: detekujHyperbolu,
      apoziopeze: detekujApoziopezi,
      apostrofa: detekujApostrofu
    };

    // =====================================================
    // 3. PROFILY ÚHLŮ – typické figury a jejich váhy
    // =====================================================
    const angleProfiles = {
      '0° analytický': {
        figury: { elipsa: 2, anafora: 2, repetice: 2, negace: 1, fragment: 1, gradace: 3 },
        negativ: ['personifikace','ironie','paradox']
      },
      '30° kulturní': {
        figury: { anafora: 2, fragment: 3, repetice: 1, hyperbola: 1 },
        negativ: ['apoziopeze','apostrofa']
      },
      '60° filozofický': {
        figury: { paradox: 4, gradace: 3, metafora: 2, gradace: 2 },
        negativ: ['fyzikalizace','apoziopeze','apostrofa']
      },
      '90° naivní': {
        figury: { apostrofa: 3, personifikace: 2, fragment: 1, repetice: 1, gradace: 1 },
        negativ: ['paradox','ironie','fyzikalizace']
      },
      '120° jazykový': {
        figury: { fyzikalizace: 4, apoziopeze: 3, fragment: 2, anafora: 1, gradace: 1 },
        negativ: ['paradox','personifikace','apostrofa']
      },
      '150° metaforický': {
        figury: { metafora: 4, personifikace: 3, fyzikalizace: 2, gradace: 2, paradox: 1 },
        negativ: ['ironie','fragment']
      },
      '180° asociační': {
        figury: { fragment: 3, repetice: 2, gradace: 1, apoziopeze: 2 },
        negativ: ['anafora','paradox','metafora']
      },
      '210° introspektivní': {
        figury: { apostrofa: 2, fragment: 2, personifikace: 1, gradace: 1 },
        negativ: ['ironie','hyperbola','fyzikalizace']
      },
      '240° ironický': {
        figury: { ironie: 4, paradox: 3, hyperbola: 2, fragment: 2 },
        negativ: ['apostrofa','personifikace']
      },
      '270° groteskní': {
        figury: { hyperbola: 4, apoziopeze: 2, fragment: 2, gradace: 3, paradox: 2 },
        negativ: ['metafora','apostrofa']
      },
      '300° absurdní': {
        figury: { fragment: 4, paradox: 3, apoziopeze: 3, gradace: 1, hyperbola: 1 },
        negativ: ['anafora','personifikace','kontrast']
      },
      '330° surrealistický': {
        figury: { metafora: 3, paradox: 3, fragment: 3, fyzikalizace: 2, gradace: 1 },
        negativ: ['ironie','apostrofa']
      }
    };

    // =====================================================
    // 4. HLAVNÍ PROMĚNNÉ A FUNKCE
    // =====================================================
    let posledniText = '';
    let detailniNalezy = {};  // { figura: [nalezy] }
    let aktivniFigura = null;

    function analyzeText(text) {
      posledniText = text;
      detailniNalezy = {};

      // detekce všech figur
      for (let [figname, detektor] of Object.entries(detektory)) {
        detailniNalezy[figname] = detektor(text);
      }

      // výpočet skóre pro úhly
      const figCounts = {};
      for (let figname in detailniNalezy) {
        figCounts[figname] = detailniNalezy[figname].length;
      }

      const scores = {};
      for (let [angle, profile] of Object.entries(angleProfiles)) {
        let score = 0;
        for (let [fig, weight] of Object.entries(profile.figury)) {
          score += (figCounts[fig] || 0) * weight;
        }
        if (profile.negativ) {
          profile.negativ.forEach(fig => {
            score -= (figCounts[fig] || 0) * 2;
          });
        }
        scores[angle] = Math.max(0, score);
      }

      return { scores, figCounts };
    }

    // =====================================================
    // 5. UI – zobrazení výsledků a detailů
    // =====================================================
    function showAngleDetail(angle) {
      const panel = document.getElementById('detailPanel');
      panel.style.display = 'block';
      panel.innerHTML = `
        <div class="detail-header">📐 ${angle}</div>
        <div class="detail-description">${popisyUhlu[angle] || 'popis chybí'}</div>
        <p style="color:#aaa; font-size:0.85rem;">Kliknutím na figuru pod výsledky zobrazíte výskpty v textu.</p>
      `;
      aktivniFigura = null;
    }

    function showFigureDetail(figura) {
      aktivniFigura = figura;
      const nalezy = detailniNalezy[figura] || [];
      const panel = document.getElementById('detailPanel');
      panel.style.display = 'block';

      let html = `
        <div class="detail-header">🔍 ${figura} (${nalezy.length} výskytů)</div>
        <div class="detail-description">${popisyFigur[figura] || 'popis chybí'}</div>
      `;

      if (nalezy.length === 0) {
        html += '<p style="color:#888;">Žádné výskyty.</p>';
      } else {
        html += '<div class="occurrences">';
        nalezy.forEach((n, idx) => {
          const vetaZkracena = n.veta.length > 80 ? n.veta.substring(0,80)+'…' : n.veta;
          html += `
            <div class="occurrence-item" data-figura="${figura}" data-index="${idx}">
              <strong>${vetaZkracena}</strong>
              <div class="context">${n.kontext || '—'}</div>
            </div>
          `;
        });
        html += '</div>';
      }

      panel.innerHTML = html;

      // přidání eventů na jednotlivé výskyty
      document.querySelectorAll('.occurrence-item').forEach(el => {
        el.addEventListener('click', function(e) {
          const figura = this.dataset.figura;
          const idx = parseInt(this.dataset.index);
          const nalezy = detailniNalezy[figura];
          if (!nalezy || !nalezy[idx]) return;

          const veta = nalezy[idx].veta;
          const textarea = document.getElementById('inputText');
          const text = textarea.value;

          // najdeme přibližnou pozici (jednoduché – hledáme prvních 30 znaků věty)
          const hledany = veta.substring(0, 30);
          const pos = text.indexOf(hledany);
          if (pos >= 0) {
            textarea.focus();
            textarea.setSelectionRange(pos, pos + veta.length);
            // jednoduché zvýraznění – nelze přímo, alespoň posuneme kurzor
            // můžeme zkusit window.find, ale není spolehlivé
            alert(`Výskyt nalezen na pozici ${pos} (přibližně). Text je označen.`);
          }
        });
      });
    }

    document.getElementById('analyzeBtn').addEventListener('click', function() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) { alert('Vlož text.'); return; }

      const { scores, figCounts } = analyzeText(text);

      const sorted = Object.entries(scores)
        .filter(([_, sc]) => sc > 0)
        .sort((a,b) => b[1] - a[1]);

      const maxScore = sorted.length ? sorted[0][1] : 0;

      // HTML pro výsledky
      let html = '<h2 style="margin-top:0;">🧭 výsledky analýzy</h2>';

      if (sorted.length === 0) {
        html += '<p style="color:#888;">✗ Žádný úhel výrazně nepřevažuje. Zkus delší nebo výraznější text.</p>';
      } else {
        sorted.slice(0,5).forEach(([angle, sc]) => {
          const percent = maxScore ? Math.round((sc / maxScore) * 100) : 0;
          html += `
            <div class="angle-row">
              <span class="angle-name" data-angle="${angle}">${angle}</span>
              <span class="angle-score">${sc}</span>
              <div class="angle-bar"><div class="angle-fill" style="width:${percent}%;"></div></div>
            </div>
          `;
        });

        const top = sorted[0];
        const protilehle = {
          '0° analytický': '180° asociační',
          '30° kulturní': '210° introspektivní',
          '60° filozofický': '240° ironický',
          '90° naivní': '270° groteskní',
          '120° jazykový': '300° absurdní',
          '150° metaforický': '330° surrealistický',
          '180° asociační': '0° analytický',
          '210° introspektivní': '30° kulturní',
          '240° ironický': '60° filozofický',
          '270° groteskní': '90° naivní',
          '300° absurdní': '120° jazykový',
          '330° surrealistický': '150° metaforický'
        };
        const prot = protilehle[top[0]] || '—';

        html += `<div class="top-angle">`;
        html += `<strong>🔍 nejpravděpodobnější úhel:</strong> ${top[0]} (skóre ${top[1]})<br>`;
        html += `<span style="color:#8a6d3b;">↔ protilehlý úhel: ${prot}</span>`;
        html += `</div>`;

        // seznam figur
        html += `<div class="figures-list">`;
        for (let [fig, count] of Object.entries(figCounts)) {
          if (count > 0) {
            html += `<span class="figure-tag" data-figure="${fig}">${fig} (${count})</span>`;
          }
        }
        html += `</div>`;
      }

      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = html;
      resultsDiv.style.display = 'block';

      // detail panel schováme (ukáže se až po kliknutí)
      document.getElementById('detailPanel').style.display = 'none';

      // eventy na názvy úhlů
      document.querySelectorAll('.angle-name').forEach(el => {
        el.addEventListener('click', function() {
          const angle = this.dataset.angle;
          showAngleDetail(angle);
        });
      });

      // eventy na figury
      document.querySelectorAll('.figure-tag').forEach(el => {
        el.addEventListener('click', function() {
          const figura = this.dataset.figure;
          showFigureDetail(figura);
        });
      });
    });
  </script>
</body>
</html>
