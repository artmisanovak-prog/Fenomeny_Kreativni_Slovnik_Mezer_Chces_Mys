<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Detektor anomálií v pohádce</title>

  <!-- Privacy-friendly analytics by Plausible -->
<script async src="https://plausible.io/js/pa-rZt5pPr7lTGl3S7OSNHqj.js"></script>
<script>
  window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
  plausible.init()
</script>

<style>

  body{
font-family: sans-serif;
padding:40px;
background:#f2f2f2;
}

textarea{
width:100%;
height:200px;
margin-bottom:20px;
font-size:16px;
padding:10px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

.vysledek{
background:white;
border-left:5px solid #444;
padding:10px;
margin-top:10px;
}

.typ{
font-weight:bold;
}
  
</style>
</head>

<body>

<h1>Detektor anomálií v pohádce</h1>

<textarea id="text" placeholder="Vlož sem pohádku..."></textarea>

<button onclick="analyzuj()">Analyzovat</button>

<div id="vysledky"></div>

<script>

  function analyzuj(){

const text = document.getElementById("text").value;

const vety = text.split(/[.!?]/);

let vysledky = [];

detekujZlom(vety,vysledky);
detekujRozhodnuti(vety,vysledky);
detekujParadox(vety,vysledky);
detekujKratkouVetu(vety,vysledky);

zobraz(vysledky);

}

function detekujZlom(vety,vysledky){

const signaly = ["najednou","zničehonic","v tu chvíli","a tehdy"];

vety.forEach((v,i)=>{

signaly.forEach(s=>{

if(v.toLowerCase().includes(s)){

vysledky.push({
typ:"Zlom děje",
text:v.trim()
});

}

});

});

}

function detekujRozhodnuti(vety,vysledky){

const slova = ["rozhodl","rozhodla","přikázal","zachtělo","usoudil"];

vety.forEach(v=>{

slova.forEach(s=>{

if(v.toLowerCase().includes(s) && !v.includes("protože")){

vysledky.push({
typ:"Chybějící motiv",
text:v.trim()
});

}

});

});

}

function detekujParadox(vety,vysledky){

const spojky = ["ale zároveň","přitom","a přesto"];

vety.forEach(v=>{

spojky.forEach(s=>{

if(v.toLowerCase().includes(s)){

vysledky.push({
typ:"Paradox",
text:v.trim()
});

}

});

});

}

function detekujKratkouVetu(vety,vysledky){

vety.forEach(v=>{

let slova = v.trim().split(" ");

if(slova.length>0 && slova.length<4){

vysledky.push({
typ:"Podezřele krátká věta",
text:v.trim()
});

}

});

}

function zobraz(vysledky){

const div = document.getElementById("vysledky");

div.innerHTML = "";

vysledky.forEach(v=>{

div.innerHTML += `
<div class="vysledek">
<span class="typ">${v.typ}</span><br>
${v.text}
</div>
`;

});

}
  
</script>

</body>
</html>
