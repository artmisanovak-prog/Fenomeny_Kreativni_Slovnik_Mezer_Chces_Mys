<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>analyzátor figur a úhlů · Chceš myš?</title>
  <style>
    /* Čistý, minimalistický styl – přesně podle tvého vkusu */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      line-height: 1.7;
      padding: 30px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 300;
      border-bottom: 1px solid #333;
      padding-bottom: 15px;
      margin-bottom: 25px;
      letter-spacing: -1px;
    }
    h1 span {
      color: #a0a0a0;
      font-size: 1rem;
      margin-left: 15px;
    }
    textarea {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      color: #ddd;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      padding: 18px;
      margin: 20px 0;
      border-radius: 0;
      resize: vertical;
    }
    button {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #444;
      padding: 14px 28px;
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      cursor: pointer;
      margin-bottom: 30px;
      transition: all 0.2s;
    }
    button:hover {
      background: #2a2a2a;
      border-color: #888;
    }
    .results {
      border: 1px solid #333;
      padding: 25px;
      background: #0f0f0f;
      margin-top: 20px;
    }
    .angle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    .angle-card {
      border: 1px solid #222;
      padding: 12px 15px;
      background: #111;
    }
    .angle-name {
      font-weight: bold;
      color: #d4b48c;
      margin-bottom: 8px;
      font-size: 1.1rem;
    }
    .angle-score {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 5px;
    }
    .angle-bar {
      width: 100%;
      height: 6px;
      background: #2a2a2a;
      border-radius: 3px;
      overflow: hidden;
    }
    .angle-fill {
      height: 100%;
      background: #8a6d3b;
      width: 0%;
    }
    .figures-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 15px;
      margin: 15px 0 10px;
    }
    .figure-tag {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      padding: 4px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 20px;
    }
    .figure-tag:hover {
      background: #2a2a2a;
      border-color: #8a6d3b;
      color: #d4b48c;
    }
    .figure-tag.active {
      background: #2a3a2a;
      border-color: #8a6d3b;
    }
    .detail-panel {
      margin-top: 25px;
      border-top: 1px solid #333;
      padding-top: 20px;
    }
    .detail-header {
      font-size: 1.2rem;
      margin-bottom: 10px;
      color: #ccc;
    }
    .detail-description {
      background: #111;
      padding: 12px 15px;
      border-left: 2px solid #8a6d3b;
      margin-bottom: 15px;
      font-style: italic;
    }
    .occurrences {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #2a2a2a;
      background: #0c0c0c;
    }
    .occurrence-item {
      padding: 8px 12px;
      border-bottom: 1px solid #222;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.9rem;
    }
    .occurrence-item:hover {
      background: #1a2a1a;
    }
    .footer {
      margin-top: 50px;
      color: #444;
      font-size: 0.8rem;
      text-align: right;
    }
    .note {
      color: #666;
      font-size: 0.85rem;
      margin-top: 15px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>analyzátor figur a úhlů <span>— pro kreativní workshopy</span></h1>
  <p style="color:#aaa; max-width:700px; margin-bottom:20px;">
    Najde v textu jazykové figury a na jejich základě odhadne, ke kterému z 12 úhlů pohledu má text nejblíž.
    Výsledky jsou orientační – inspirace, ne diagnostika.
  </p>

  <textarea id="inputText" rows="10" placeholder="Sem vlož libovolný text – třeba úryvek z pohádky, vlastní psaní, cokoli..."></textarea>
  <button id="analyzeBtn">analyzovat</button>

  <div id="results" class="results" style="display: none;"></div>
  <div id="detailPanel" class="detail-panel" style="display: none;"></div>

  <footer class="footer">
    analyzátor figur a úhlů · projekt Chceš myš? · © Michaela Nováková 2026
  </footer>

  <script>
    // ============================================================
    // 1. SLOVNÍKY – popisy figur a úhlů (pro nápovědu)
    // ============================================================
    const popisyFigur = {
      elipsa: 'Vynechání části věty (nejčastěji slovesa). Vytváří napětí, zkratkovitost.',
      anafora: 'Opakování stejného slova na začátku po sobě jdoucích vět.',
      repetice: 'Opakování stejného slova v krátkém úseku. Zvyšuje důraz.',
      negace: 'Použití záporu (ne, není, nikdo). Vymezuje, co věc není.',
      fragment: 'Krátký, izolovaný úsek, který není úplnou větou.',
      gradace: 'Stupňování – řazení výrazů od nejslabšího po nejsilnější.',
      metafora: 'Přenos významu na základě podobnosti. Často ve tvaru "X je Y".',
      personifikace: 'Přiřazení lidských vlastností neživým věcem nebo zvířatům.',
      fyzikalizace: 'Abstraktní pojmy se chovají jako hmotné objekty (padají, visí, tečou).',
      paradox: 'Zdánlivě nesmyslné tvrzení, které může obsahovat pravdu.',
      ironie: 'Vyjádření opaku toho, co se myslí.',
      hyperbola: 'Záměrné přehánění – nadsázka.',
      apoziopeze: 'Náhlé přerušení výpovědi, nedokončená věta (tři tečky, pomlčka).',
      apostrofa: 'Oslovení nepřítomné osoby, abstraktní entity nebo čtenáře.',
      kontrast: 'Stavění protikladů vedle sebe (malý × velký, ale, naopak).',
      paralelismus: 'Opakování stejné syntaktické struktury v sousedních větách.',
      enumerace: 'Výčet – řazení slov nebo frází za sebou, často s čárkami.',
      oxymoron: 'Spojení dvou slov s opačným významem (živá mrtvola).',
      aforismus: 'Krátká, obecně platná věta (často na konci odstavce).',
      synestezie: 'Míchání smyslových vjemů (teplá barva, křiklavé ticho).',
      chiasmus: 'Křížové uspořádání (AB → BA) v jedné větě.'
    };

    const popisyUhlu = {
      '0° analytický': 'Soustředí se na fakta, čísla, přesné údaje. Používá elipsy, výčty, anafory.',
      '30° kulturní': 'Pracuje s kulturními odkazy, mýty, ustálenými frázemi.',
      '60° filozofický': 'Klade otázky po smyslu, existenci, pravdě. Typické jsou paradoxy, aforismy.',
      '90° naivní': 'Dětský, jednoduchý pohled. Přímá oslovení, personifikace.',
      '120° jazykový': 'Zabývá se jazykem jako materiálem – fyzikalizace, neologismy, hra se slovy.',
      '150° metaforický': 'Vidí světy v obrazech a symbolech. Metafory, personifikace.',
      '180° asociační': 'Volně propojuje myšlenky, skáče od jednoho k druhému. Fragmenty.',
      '210° introspektivní': 'Obrácený dovnitř – pocity, pochybnosti, vnitřní monology.',
      '240° ironický': 'Nadhled, výsměch, převracení hodnot. Ironie, kontrast, paradox.',
      '270° groteskní': 'Přehnaný, absurdní, často děsivě komický. Hyperbola, absurdní obrazy.',
      '300° absurdní': 'Svět, kde neplatí logika. Fragmenty, nelogická spojení, rozpad syntaxe.',
      '330° surrealistický': 'Snová logika, prolínání realit, metamorfózy.'
    };

    // ============================================================
    // 2. PROFILY ÚHLŮ – typické figury (odvozené ze 4 pohádek)
    // ============================================================
    const angleProfiles = {
      '0° analytický': ['elipsa', 'gradace', 'kontrast', 'enumerace', 'anafora', 'negace', 'fragment'],
      '30° kulturní': ['intertextualita', 'aforismus'],
      '60° filozofický': ['paradox', 'kontrast', 'otázka', 'aforismus'],
      '90° naivní': ['apostrofa', 'personifikace', 'jednoduché věty'],
      '120° jazykový': ['fyzikalizace', 'apoziopeze', 'neologismus', 'elipsa'],
      '150° metaforický': ['metafora', 'personifikace', 'symbol'],
      '180° asociační': ['fragment', 'apoziopeze'],
      '210° introspektivní': ['sebereflexe', 'vnitřní hlas', 'mlčení'],
      '240° ironický': ['ironie', 'kontrast', 'paradox'],
      '270° groteskní': ['hyperbola', 'absurdní obraz', 'onomatopoie'],
      '300° absurdní': ['fragment', 'paradox', 'elipsa', 'nelogické spojení'],
      '330° surrealistický': ['snový obraz', 'metamorfóza', 'synestezie']
    };

    // ============================================================
    // 3. DETEKTORY FIGUR – každý vrací pole nálezů
    //    (zjednodušené, ale pro workshopy dostačující)
    // ============================================================
    function detekujElipsy(text) {
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        const slova = veta.split(/\s+/);
        if (slova.length <= 3) {
          const posledni = slova[slova.length-1].toLowerCase();
          // není-li poslední slovo typické sloveso (končí na -l, -la, -lo, -li, -ly, -t)
          if (!posledni.match(/(l|la|lo|li|ly|t)$/)) {
            nalezy.push({ veta, index: idx, kontext: veta.substring(0, 40) });
          }
        }
      });
      return nalezy;
    }

    function detekujAnaforu(text) {
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      for (let i = 0; i < vety.length-1; i++) {
        const prvni1 = vety[i].split(/\s+/)[0] || '';
        const prvni2 = vety[i+1].split(/\s+/)[0] || '';
        if (prvni1 && prvni2 && prvni1.toLowerCase() === prvni2.toLowerCase()) {
          nalezy.push({ veta: vety[i] + ' … ' + vety[i+1], index: i, kontext: prvni1 });
        }
      }
      return nalezy;
    }

    function detekujRepetici(text) {
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        const slova = veta.toLowerCase().split(/\s+/);
        const frekvence = {};
        slova.forEach(s => { if (s.length>2) frekvence[s] = (frekvence[s]||0)+1; });
        for (let f in frekvence) {
          if (frekvence[f] >= 3) {
            nalezy.push({ veta, index: idx, kontext: `opakování "${f}"` });
            break;
          }
        }
      });
      return nalezy;
    }

    function detekujNegaci(text) {
      const neg = ['ne','není','nejsou','nebyl','nebyla','nebylo','nemá','nikdo','nic','žádný'];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        let found = false;
        neg.forEach(n => { if (veta.toLowerCase().includes(n)) found = true; });
        if (found) nalezy.push({ veta, index: idx, kontext: 'obsahuje negaci' });
      });
      return nalezy;
    }

    function detekujFragment(text) {
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        const slova = veta.split(/\s+/);
        if (slova.length <= 2 && veta.length>0) {
          nalezy.push({ veta, index: idx, kontext: 'krátký fragment' });
        }
      });
      return nalezy;
    }

    function detekujGradaci(text) {
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        const match = veta.match(/\b(\w+)(ější|ější|ější|ší|ší|ější|ější|ejší|ejší)\b/gi);
        if (match && match.length >= 2) {
          nalezy.push({ veta, index: idx, kontext: 'gradace: ' + match.join(', ') });
        }
      });
      return nalezy;
    }

    function detekujMetaforu(text) {
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        // hledáme "X je Y" (jednoduchá heuristika)
        const match = veta.match(/\b(\w+(?:\s+\w+)?)\s+(je|jsou|byl|byla|byli|byly)\s+(\w+(?:\s+\w+)?)\b/i);
        if (match) {
          nalezy.push({ veta, index: idx, kontext: match[0] });
        }
      });
      return nalezy;
    }

    function detekujPersonifikaci(text) {
      const lidskaSlovesa = ['mluví','řekl','říká','zeptala','odpověděla','přemýšlí','myslí','cítí','směje','pláče','zapisuje','počítá','chodí','běží','sedí','stojí','leží','spí','vstává'];
      const nezive = ['čas','den','noc','tma','světlo','stín','voda','vítr','oheň','země','nebe','strom','kámen','řeka','město','dům','les','pole','slunce','měsíc','hvězda'];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        nezive.forEach(n => {
          const regex = new RegExp('\\b'+n+'\\s+(\\w+)','gi');
          const match = regex.exec(veta);
          if (match && lidskaSlovesa.includes(match[1].toLowerCase())) {
            nalezy.push({ veta, index: idx, kontext: `${n} ${match[1]}` });
          }
        });
      });
      return nalezy;
    }

    function detekujFyzikalizaci(text) {
      const abstrakt = ['slovo','věta','řeč','jazyk','myšlenka','otázka','odpověď','význam','smysl','láska','strach','smutek','radost','naděje','paměť','vzpomínka','sen','příběh'];
      const fyzSlovesa = ['padá','letí','teče','visí','stoupá','klesá','tuhne','tvrdne','měkne','spolkl','krká','polyká','teče','kapá','hoří','doutná'];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        abstrakt.forEach(a => {
          fyzSlovesa.forEach(f => {
            const regex = new RegExp('\\b'+a+'\\s+'+f+'\\b|\\b'+f+'\\s+'+a+'\\b','gi');
            if (regex.test(veta)) nalezy.push({ veta, index: idx, kontext: `${a} / ${f}` });
          });
        });
      });
      return nalezy;
    }

    function detekujParadox(text) {
      const vzorce = [
        /\b(\w+)\s+(a přesto|a přece|ale přesto|ale stejně)\s+(ne-?\w+)/gi,
        /\b(živý|živá|živé)\s+(mrtvola|mrtvý|neživý)\b/gi,
        /\b(tma|temnota)\s+(světlo|záře|jas)\b|\b(světlo)\s+(tma|temnota)\b/gi,
        /(\w+)\s+není\s+(\w+)\s+ale\s+(\w+)/gi
      ];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        vzorce.forEach(v => {
          if (v.test(veta)) nalezy.push({ veta, index: idx, kontext: 'paradox' });
        });
      });
      return nalezy;
    }

    function detekujIronii(text) {
      const ironSlova = ['samozřejmě','jasně','jistě','ovšem','pochopitelně','jako by ne'];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        ironSlova.forEach(i => {
          if (veta.toLowerCase().includes(i)) nalezy.push({ veta, index: idx, kontext: i });
        });
      });
      return nalezy;
    }

    function detekujHyperbolu(text) {
      const slova = ['všechno','nikdo','nikdy','vždycky','absolutně','nekonečný','obrovský','neskutečný','věčný','donekonečna'];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        slova.forEach(h => {
          if (veta.toLowerCase().includes(h)) nalezy.push({ veta, index: idx, kontext: h });
        });
      });
      return nalezy;
    }

    function detekujApoziopezi(text) {
      const nalezy = [];
      const segmenty = text.split(/(?<=[.!?…])\s+/);
      segmenty.forEach((seg, idx) => {
        if (seg.includes('…') || seg.includes('...') || seg.includes('–')) {
          nalezy.push({ veta: seg, index: idx, kontext: 'přerušení' });
        }
      });
      return nalezy;
    }

    function detekujApostrofu(text) {
      const osloveni = ['představte si','představ si','věřte mi','věř mi','poslouchejte','poslouchej','podívejte se','podívej se','dovedete si','dokážeš si'];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        osloveni.forEach(o => {
          if (veta.toLowerCase().includes(o)) nalezy.push({ veta, index: idx, kontext: o });
        });
      });
      return nalezy;
    }

    function detekujKontrast(text) {
      const antonyma = [
        ['malý','velký'], ['malá','velká'], ['malé','velké'],
        ['těžký','lehký'], ['rychlý','pomalý'], ['rychle','pomalu'],
        ['černá','bílá'], ['světlo','tma'], ['den','noc'],
        ['nahoře','dole'], ['nahoru','dolů'], ['vpřed','vzad'],
        ['život','smrt'], ['láska','nenávist'], ['radost','smutek']
      ];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        const vetaLower = veta.toLowerCase();
        antonyma.forEach(([a,b]) => {
          if (vetaLower.includes(a) && vetaLower.includes(b)) {
            nalezy.push({ veta, index: idx, kontext: `${a} × ${b}` });
          }
        });
        if (vetaLower.includes('ale') || vetaLower.includes('naopak') || vetaLower.includes('zatímco')) {
          nalezy.push({ veta, index: idx, kontext: 'kontrastní spojka' });
        }
      });
      return nalezy;
    }

    function detekujParalelismus(text) {
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      for (let i = 0; i < vety.length-1; i++) {
        const slova1 = vety[i].split(/\s+/);
        const slova2 = vety[i+1].split(/\s+/);
        if (slova1.length >=2 && slova2.length >=2) {
          if (slova1[0].toLowerCase() === slova2[0].toLowerCase() &&
              slova1[1].toLowerCase() === slova2[1].toLowerCase()) {
            nalezy.push({ veta: vety[i] + ' … ' + vety[i+1], index: i, kontext: 'paralelní začátky' });
          }
        }
      }
      return nalezy;
    }

    function detekujEnumeraci(text) {
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        const carky = (veta.match(/,/g) || []).length;
        if (carky >= 2 && veta.split(/\s+/).length > 3) {
          nalezy.push({ veta, index: idx, kontext: 'výčet s čárkami' });
        }
        if (veta.includes(' a ') && veta.includes(',')) {
          nalezy.push({ veta, index: idx, kontext: 'výčet' });
        }
      });
      return nalezy;
    }

    function detekujOxymoron(text) {
      const antonyma = [
        ['živý','mrtvola'], ['živá','mrtvola'], ['živé','mrtvé'],
        ['temná','záře'], ['temný','jas'], ['hlučné','ticho'],
        ['něžný','tygr'], ['sladká','hořkost'], ['studený','oheň']
      ];
      const vety = text.split(/[.!?…]+/).map(v => v.trim()).filter(v => v.length > 0);
      const nalezy = [];
      vety.forEach((veta, idx) => {
        const vetaLower = veta.toLowerCase();
        antonyma.forEach(([a,b]) => {
          const regex = new RegExp(`\\b${a}\\s+(?:\\w+\\s+){0,2}${b}\\b|\\b${b}\\s+(?:\\w+\\s+){0,2}${a}\\b`, 'i');
          if (regex.test(veta)) nalezy.push({ veta, index: idx, kontext: `${a} × ${b}` });
        });
      });
      return nalezy;
    }

    // ============================================================
    // 4. MAPA DETEKTORŮ – pro automatické volání
    // ============================================================
    const detektory = {
      elipsa: detekujElipsy,
      anafora: detekujAnaforu,
      repetice: detekujRepetici,
      negace: detekujNegaci,
      fragment: detekujFragment,
      gradace: detekujGradaci,
      metafora: detekujMetaforu,
      personifikace: detekujPersonifikaci,
      fyzikalizace: detekujFyzikalizaci,
      paradox: detekujParadox,
      ironie: detekujIronii,
      hyperbola: detekujHyperbolu,
      apoziopeze: detekujApoziopezi,
      apostrofa: detekujApostrofu,
      kontrast: detekujKontrast,
      paralelismus: detekujParalelismus,
      enumerace: detekujEnumeraci,
      oxymoron: detekujOxymoron
    };

    // ============================================================
    // 5. HLAVNÍ ANALÝZA
    // ============================================================
    let posledniNalezy = {};

    function analyzeText(text) {
      const figCounts = {};
      posledniNalezy = {};

      for (let [figname, detektor] of Object.entries(detektory)) {
        const nalezy = detektor(text);
        posledniNalezy[figname] = nalezy;
        figCounts[figname] = nalezy.length;
      }

      // Výpočet skóre pro úhly
      const angleScores = {};
      for (let [angle, typickeFigury] of Object.entries(angleProfiles)) {
        let score = 0;
        typickeFigury.forEach(fig => {
          if (figCounts[fig]) score += figCounts[fig];
        });
        angleScores[angle] = score;
      }

      return { angleScores, figCounts };
    }

    // ============================================================
    // 6. UI – zobrazení výsledků a detailů
    // ============================================================
    function showFigureDetail(figura) {
      const nalezy = posledniNalezy[figura] || [];
      const panel = document.getElementById('detailPanel');
      let html = `
        <div class="detail-header">🔍 ${figura} (${nalezy.length} výskytů)</div>
        <div class="detail-description">${popisyFigur[figura] || 'popis chybí'}</div>
      `;
      if (nalezy.length === 0) {
        html += '<p style="color:#888;">Žádné výskyty.</p>';
      } else {
        html += '<div class="occurrences">';
        nalezy.forEach((n, idx) => {
          const vetaZkracena = n.veta.length > 80 ? n.veta.substring(0,80)+'…' : n.veta;
          html += `
            <div class="occurrence-item" data-figura="${figura}" data-index="${idx}">
              <strong>${vetaZkracena}</strong>
              <div class="context">${n.kontext || '—'}</div>
            </div>
          `;
        });
        html += '</div>';
      }
      panel.innerHTML = html;
      panel.style.display = 'block';
    }

    document.getElementById('analyzeBtn').addEventListener('click', function() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) { alert('Vlož text.'); return; }

      const { angleScores, figCounts } = analyzeText(text);

      // Seřazení úhlů podle skóre
      const sortedAngles = Object.entries(angleScores).sort((a,b) => b[1] - a[1]);
      const maxScore = sortedAngles.length ? sortedAngles[0][1] : 0;

      // Výpis výsledků
      let html = '<h2 style="margin-top:0;">📊 výsledky analýzy</h2>';

      if (sortedAngles.length === 0 || maxScore === 0) {
        html += '<p style="color:#888;">✗ Žádné výrazné figury nenalezeny. Zkus delší nebo výraznější text.</p>';
      } else {
        // Graf úhlů
        html += '<div class="angle-grid">';
        sortedAngles.forEach(([angle, score]) => {
          const percent = maxScore ? Math.round((score / maxScore) * 100) : 0;
          html += `
            <div class="angle-card">
              <div class="angle-name">${angle}</div>
              <div class="angle-score">skóre: ${score}</div>
              <div class="angle-bar"><div class="angle-fill" style="width:${percent}%;"></div></div>
            </div>
          `;
        });
        html += '</div>';

        // Nejpravděpodobnější úhel
        const top = sortedAngles[0];
        html += `<div style="background:#1e2a1e; padding:10px 15px; margin:15px 0; border-left:4px solid #8a6d3b;">`;
        html += `<strong>🎯 nejpravděpodobnější úhel:</strong> ${top[0]} (skóre ${top[1]})<br>`;
        html += `<span style="color:#aaa; font-size:0.85rem;">Podle typických figur pro tento úhel.</span>`;
        html += `</div>`;

        // Seznam nalezených figur
        html += '<div class="figures-list">';
        for (let [fig, count] of Object.entries(figCounts)) {
          if (count > 0) {
            html += `<span class="figure-tag" data-figure="${fig}">${fig} (${count})</span>`;
          }
        }
        html += '</div>';
        html += '<p class="note">Kliknutím na název figury zobrazíš detail a místa v textu.</p>';
      }

      document.getElementById('results').innerHTML = html;
      document.getElementById('results').style.display = 'block';
      document.getElementById('detailPanel').style.display = 'none';

      // Eventy na figury
      document.querySelectorAll('.figure-tag').forEach(el => {
        el.addEventListener('click', function() {
          const figura = this.dataset.figure;
          showFigureDetail(figura);
        });
      });
    });
  </script>
</body>
</html>
