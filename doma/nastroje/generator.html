<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generativní mód · Chceš myš?</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--s:#0d1018;--s2:#12161f;--s3:#171c27;
  --c:#cdd8e8;--dim:rgba(180,200,230,.35);--a:#7a5f3e;--a2:#5a452e;
  --b:rgba(122,95,62,.12);--b2:rgba(122,95,62,.26);
  --serif:'Cormorant Garamond',Georgia,serif;--mono:'DM Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--c);font-family:var(--mono);font-size:13px;line-height:1.85;-webkit-font-smoothing:antialiased;padding:24px}
.wrap{max-width:880px;margin:0 auto}

h1{font-family:var(--serif);font-size:2.4rem;font-weight:300;margin-bottom:0.2rem}
h1 em{font-style:italic;color:var(--a)}
.subhead{font-size:.85rem;color:var(--dim);margin-bottom:2rem;border-left:2px solid var(--a2);padding-left:1rem}

.generator-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
@media(max-width:700px){.generator-grid{grid-template-columns:1fr}}

.panel{background:var(--s);border:1px solid var(--b);padding:24px}
.panel h2{font-family:var(--serif);font-size:1.3rem;font-weight:300;margin-bottom:16px}
.panel h2 em{color:var(--a)}

select, button{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--c);padding:10px 12px;font-family:var(--mono);font-size:.8rem;margin-bottom:16px;cursor:pointer}
select:focus, button:focus{outline:none;border-color:var(--a2)}
button{background:var(--a);color:var(--bg);font-weight:400;letter-spacing:.1em;text-transform:uppercase;border:none;transition:.1s}
button:hover{background:#9a7c5a}
button:disabled{background:var(--s2);color:var(--dim);border:1px solid var(--b);cursor:not-allowed}

.q3-box{background:var(--s3);border-left:3px solid var(--a);padding:16px;margin-bottom:16px;font-size:.85rem;line-height:1.9;color:rgba(200,218,238,.85)}
.q3-label{font-size:.65rem;letter-spacing:.16em;text-transform:uppercase;color:var(--a2);margin-bottom:6px}

.result{background:var(--s);border:1px solid var(--b2);padding:32px;margin-top:24px}
.result h3{font-family:var(--serif);font-size:1.6rem;font-weight:300;margin-bottom:8px}
.result-meta{font-size:.7rem;color:var(--dim);margin-bottom:16px}
.result-content{font-size:.9rem;line-height:1.95;color:rgba(200,218,238,.9);white-space:pre-wrap}
.result-content strong{color:var(--a);font-weight:400}

.footer-note{font-size:.7rem;color:var(--dim);margin-top:24px;text-align:center}
</style>
</head>
<body>

<div class="wrap">

<h1>Generativní <em>mód</em></h1>
<div class="subhead">Spoj dva různé úhly z libovolných karet – vznikne nové cvičení.</div>

<div class="generator-grid">
  <!-- Levý panel: karta a úhel A -->
  <div class="panel">
    <h2>První <em>úhel</em></h2>
    <select id="cardA" onchange="loadAngles('A')">
      <option value="">-- vyber kartu --</option>
    </select>
    <select id="angleA" disabled onchange="displayQ3('A')">
      <option value="">-- nejdřív vyber kartu --</option>
    </select>
    <div id="q3A" class="q3-box">Vyber úhel, zobrazí se Q3.</div>
  </div>

  <!-- Pravý panel: karta a úhel B -->
  <div class="panel">
    <h2>Druhý <em>úhel</em></h2>
    <select id="cardB" onchange="loadAngles('B')">
      <option value="">-- vyber kartu --</option>
    </select>
    <select id="angleB" disabled onchange="displayQ3('B')">
      <option value="">-- nejdřív vyber kartu --</option>
    </select>
    <div id="q3B" class="q3-box">Vyber úhel, zobrazí se Q3.</div>
  </div>
</div>

<!-- Tlačítko generovat -->
<button id="generateBtn" onclick="generateExercise()" disabled>🔮 Vygenerovat nové cvičení</button>

<!-- Výsledek -->
<div class="result" id="result" style="display:none">
  <h3 id="resultTitle"></h3>
  <div class="result-meta" id="resultMeta"></div>
  <div class="result-content" id="resultContent"></div>
</div>

<div class="footer-note">
  ⚡ Každá kombinace vytvoří unikátní cvičení. Placené karty jsou po zakoupení odemčené.
</div>

</div>

// =====================================================
// LOGIKA GENERÁTORU
// =====================================================
let selectedCardA = null, selectedCardB = null;
let selectedAngleA = null, selectedAngleB = null;

function init() {
  const cardASelect = document.getElementById('cardA');
  const cardBSelect = document.getElementById('cardB');
  
  KARTY.forEach(karta => {
    const optionA = document.createElement('option');
    optionA.value = karta.id;
    optionA.textContent = karta.name;
    cardASelect.appendChild(optionA);
    
    const optionB = document.createElement('option');
    optionB.value = karta.id;
    optionB.textContent = karta.name;
    cardBSelect.appendChild(optionB);
  });
}

function loadAngles(side) {
  const cardId = document.getElementById(`card${side}`).value;
  if (!cardId) {
    document.getElementById(`angle${side}`).innerHTML = '<option value="">-- nejdřív vyber kartu --</option>';
    document.getElementById(`angle${side}`).disabled = true;
    document.getElementById(`q3${side}`).innerHTML = 'Vyber úhel, zobrazí se Q3.';
    if (side === 'A') selectedCardA = null;
    else selectedCardB = null;
    checkGenerateBtn();
    return;
  }
  
  const karta = KARTY.find(k => k.id === cardId);
  if (!karta) return;
  
  if (side === 'A') selectedCardA = karta;
  else selectedCardB = karta;
  
  const angleSelect = document.getElementById(`angle${side}`);
  angleSelect.innerHTML = '';
  angleSelect.disabled = false;
  
  // Seřadit úhly podle ID (0,30,60,90,120,150,180,210,240,270,300,330)
  const sortedAngles = [...karta.angles].sort((a,b) => parseInt(a.id) - parseInt(b.id));
  
  sortedAngles.forEach(angle => {
    const option = document.createElement('option');
    option.value = angle.id;
    option.textContent = angle.name;
    angleSelect.appendChild(option);
  });
  
  // Pokud byl už vybrán úhel, zobrazíme ho
  if (angleSelect.value) {
    displayQ3(side);
  } else {
    document.getElementById(`q3${side}`).innerHTML = 'Vyber úhel, zobrazí se Q3.';
  }
  checkGenerateBtn();
}

function displayQ3(side) {
  const card = side === 'A' ? selectedCardA : selectedCardB;
  const angleId = document.getElementById(`angle${side}`).value;
  if (!card || !angleId) return;
  
  const angle = card.angles.find(a => a.id === angleId);
  if (!angle) return;
  
  if (side === 'A') selectedAngleA = angle;
  else selectedAngleB = angle;
  
  document.getElementById(`q3${side}`).innerHTML = `<span class="q3-label">Q3 · ${angle.name}</span>${angle.q3}`;
  checkGenerateBtn();
}

function checkGenerateBtn() {
  const btn = document.getElementById('generateBtn');
  if (selectedAngleA && selectedAngleB && selectedAngleA !== selectedAngleB) {
    btn.disabled = false;
  } else {
    btn.disabled = true;
  }
}

function generateExercise() {
  if (!selectedAngleA || !selectedAngleB || selectedAngleA === selectedAngleB) {
    alert('Vyberte dva RŮZNÉ úhly.');
    return;
  }
  
  const cardA = selectedCardA;
  const cardB = selectedCardB;
  const angleA = selectedAngleA;
  const angleB = selectedAngleB;
  
  // Název cvičení
  const title = `${cardA.name} · ${angleA.name} × ${cardB.name} · ${angleB.name}`;
  
  // Meta informace
  const meta = `Kombinace úhlů · ${new Date().toLocaleDateString('cs-CZ')}`;
  
  // Samotné cvičení – spojení dvou Q3
  const content = `**Cvičení (20–30 minut)**\n\n1. Nejprve pracuj z pohledu prvního úhlu:\n${angleA.q3}\n\n2. Poté se přepni do druhého úhlu:\n${angleB.q3}\n\n3. Na závěr obě verze porovnej. Co ti která perspektiva dala? Kde se lišily? Kde se naopak překvapivě potkaly?`;
  
  document.getElementById('resultTitle').innerHTML = title;
  document.getElementById('resultMeta').textContent = meta;
  document.getElementById('resultContent').innerHTML = content.replace(/\n/g, '<br>');
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({behavior:'smooth', block:'start'});
}

// Spustit při načtení
window.onload = init;
</script>
