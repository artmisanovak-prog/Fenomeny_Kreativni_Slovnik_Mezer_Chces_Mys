<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChceéÀ myéÀ? - KognitivnûÙ analyzûÀtor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 40px;
        }

        .input-section {
            display: flex;
            flex-direction: column;
        }

        .input-section h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #667eea;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-analyze {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .results-section {
            display: flex;
            flex-direction: column;
        }

        .results-section h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #667eea;
        }

        .radar-container {
            width: 100%;
            height: 400px;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
        }

        .angles-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .angle-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .angle-name {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .angle-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .angle-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8em;
            font-weight: bold;
        }

        .footer {
            background: #f9f9f9;
            padding: 20px;
            text-align: center;
            color: #666;
            border-top: 1px solid #ddd;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .angle-color-0 { border-left-color: #FF6B6B; }
        .angle-color-1 { border-left-color: #4ECDC4; }
        .angle-color-2 { border-left-color: #45B7D1; }
        .angle-color-3 { border-left-color: #FFA07A; }
        .angle-color-4 { border-left-color: #98D8C8; }
        .angle-color-5 { border-left-color: #F7DC6F; }
        .angle-color-6 { border-left-color: #BB8FCE; }
        .angle-color-7 { border-left-color: #85C1E2; }
        .angle-color-8 { border-left-color: #F8B88B; }
        .angle-color-9 { border-left-color: #ABEBC6; }
        .angle-color-10 { border-left-color: #F5B7B1; }
        .angle-color-11 { border-left-color: #D7BDE2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ÞÙ ChceéÀ myéÀ?</h1>
            <p>KognitivnûÙ analyzûÀtor - MapovûÀnûÙ 12 û¤hlé₤ myéÀlenûÙ</p>
        </div>

        <div class="content">
            <div class="input-section">
                <h2>Vloéƒte své₤j text</h2>
                <textarea id="textInput" placeholder="NapiéÀte nebo vloéƒte text, kterû§ chcete analyzovat..."></textarea>
                <div class="button-group">
                    <button class="btn-analyze" onclick="analyzeText()">Analyzovat</button>
                    <button class="btn-clear" onclick="clearAll()">Vymazat</button>
                </div>
            </div>

            <div class="results-section">
                <h2>Vû§sledky analû§zy</h2>
                <div class="radar-container">
                    <canvas id="radarChart"></canvas>
                </div>
                <div class="angles-list" id="anglesList"></div>
            </div>
        </div>

        <div class="footer">
            <p>Systûˋm "ChceéÀ myéÀ?" mapuje péûÙtomnost 12 kognitivnûÙch û¤hlé₤ v textu. Kaéƒdû§ û¤hel se poáûÙtûÀ nezûÀvisle na 100%.</p>
        </div>
    </div>

    <script>
        // Definice 12 û¤hlé₤ a jejich figur
        const angles = [
            {
                id: 0,
                name: "Analytickû§",
                degree: 0,
                color: "#FF6B6B",
                microFigures: {
                    "vû§áet": /(\w+,\s*){2,}\w+/g,
                    "negace": /\b(ne\w+|nikoli|éƒûÀdnû§|nic)\b/gi
                },
                macroPatterns: {
                    "enumerace": (text) => {
                        const lines = text.split('\n');
                        let count = 0;
                        for (let i = 0; i < lines.length - 1; i++) {
                            if (/^\d+\.|^\*|^-/.test(lines[i].trim()) && /^\d+\.|^\*|^-/.test(lines[i+1].trim())) {
                                count++;
                            }
                        }
                        return count >= 2;
                    }
                }
            },
            {
                id: 1,
                name: "KulturnûÙ",
                degree: 30,
                color: "#4ECDC4",
                microFigures: {
                    "pasivum": /(je|bylo|bude)\s+\w+l[aouyûÙá]/gi,
                    "péûÙmûÀ éeá": /[ã"].*?[ã"]/g
                },
                macroPatterns: {
                    "zmána role": (text) => {
                        const firstPersonCount = (text.match(/\b(jûÀ|my|má|nûÀs|mé₤j|nûÀéÀ)\b/gi) || []).length;
                        const thirdPersonCount = (text.match(/\b(on|ona|oni|ony|jeho|jejich)\b/gi) || []).length;
                        return firstPersonCount > 0 && thirdPersonCount > 0;
                    }
                }
            },
            {
                id: 2,
                name: "Filozofickû§",
                degree: 60,
                color: "#45B7D1",
                microFigures: {
                    "imperativ": /\b(hledej|myslej|váé|dálej|jdi|pojá|éekni)\b/gi,
                    "abstrakta": /\b\w+(ost|stvûÙ|nûÙ|ost)\b/gi
                },
                macroPatterns: {
                    "éeánickûˋ otûÀzky": (text) => {
                        const questions = (text.match(/\?/g) || []).length;
                        return questions >= 2;
                    }
                }
            },
            {
                id: 3,
                name: "NaivnûÙ",
                degree: 90,
                color: "#FFA07A",
                microFigures: {
                    "elipsa": /^[A-Z]\w+(\s+\w+){0,2}\.$/gm,
                    "fragment": /^[A-Z]\w+\.$/gm
                },
                macroPatterns: {
                    "minimalismus": (text) => {
                        const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
                        const shortSentences = sentences.filter(s => s.trim().split(/\s+/).length <= 3).length;
                        return shortSentences / sentences.length > 0.5;
                    }
                }
            },
            {
                id: 4,
                name: "Jazykovû§",
                degree: 120,
                color: "#98D8C8",
                microFigures: {
                    "aliterace": /\b([a-z])\w+\s+\1\w+\s+\1\w+/gi,
                    "onomatopoeia": /\b(bum|prûÀsk|kéup|mlask|chéap|vrr|méau|pûÙp|bûÀc|buch)\b/gi
                },
                macroPatterns: {
                    "rytmizace": (text) => {
                        const words = text.split(/\s+/);
                        let rhymeCount = 0;
                        for (let i = 0; i < words.length - 1; i++) {
                            const w1 = words[i].toLowerCase().slice(-2);
                            const w2 = words[i+1].toLowerCase().slice(-2);
                            if (w1 === w2) rhymeCount++;
                        }
                        return rhymeCount >= 2;
                    }
                }
            },
            {
                id: 5,
                name: "Metaforickû§",
                degree: 150,
                color: "#F7DC6F",
                microFigures: {
                    "metafora": /\b(je jako|jsou jako|bytûÙ jako|je zase)\b/gi,
                    "péirovnûÀnûÙ": /\bjako\s+\w+/gi
                },
                macroPatterns: {
                    "symbolika": (text) => {
                        const metaphors = (text.match(/\b(je jako|jsou jako)\b/gi) || []).length;
                        return metaphors >= 1;
                    }
                }
            },
            {
                id: 6,
                name: "AsociaánûÙ",
                degree: 180,
                color: "#BB8FCE",
                microFigures: {
                    "fragment": /^[A-Z]\w+\s+\w+\.$/gm,
                    "elipsa": /^[A-Z]\w+\.$/gm
                },
                macroPatterns: {
                    "zmána rytmu": (text) => {
                        const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
                        let longCount = 0, shortCount = 0;
                        sentences.forEach(s => {
                            const wordCount = s.trim().split(/\s+/).length;
                            if (wordCount > 20) longCount++;
                            if (wordCount < 5) shortCount++;
                        });
                        return longCount >= 2 && shortCount >= 2;
                    }
                }
            },
            {
                id: 7,
                name: "IntrospektivnûÙ",
                degree: 210,
                color: "#85C1E2",
                microFigures: {
                    "prvnûÙ osoba": /\b(jûÀ|má|mi|mé₤j|moje|my|nûÀs|nûÀéÀ)\b/gi,
                    "otûÀzka": /\?/g
                },
                macroPatterns: {
                    "monolog": (text) => {
                        const firstPersonCount = (text.match(/\b(jûÀ|my|má|nûÀs|mé₤j|nûÀéÀ)\b/gi) || []).length;
                        const totalWords = text.split(/\s+/).length;
                        return firstPersonCount / totalWords > 0.05;
                    }
                }
            },
            {
                id: 8,
                name: "Ironickû§",
                degree: 240,
                color: "#F8B88B",
                microFigures: {
                    "negace 2+": (text) => {
                        const sentences = text.split(/[.!?]+/);
                        let count = 0;
                        sentences.forEach(s => {
                            const negations = (s.match(/\b(ne\w+|nic|nikdo|nikdy)\b/gi) || []).length;
                            if (negations >= 2) count++;
                        });
                        return count;
                    },
                    "zvrat": /\b(ale|a péesto|véÀak|jenéƒe)\b/gi
                },
                macroPatterns: {
                    "ironickûˋ uvozenûÙ": (text) => {
                        return /(jistá|samozéejmá|vlastná|opravdu)/gi.test(text);
                    }
                }
            },
            {
                id: 9,
                name: "GrotesknûÙ",
                degree: 270,
                color: "#ABEBC6",
                microFigures: {
                    "hyperbola": /\b(û¤plná|straéÀná|moc|péûÙliéÀ|éÀûÙlená|nej\w+)\b/gi,
                    "gradace": /(\w+),\s*(\w+),\s*(\w+)/g
                },
                macroPatterns: {
                    "nadsûÀzka": (text) => {
                        const hyperbolas = (text.match(/\b(û¤plná|straéÀná|nej\w+)\b/gi) || []).length;
                        const exclamations = (text.match(/!/g) || []).length;
                        return hyperbolas >= 2 || (hyperbolas >= 1 && exclamations >= 1);
                    }
                }
            },
            {
                id: 10,
                name: "AbsurdnûÙ",
                degree: 300,
                color: "#F5B7B1",
                microFigures: {
                    "inverze": /^[A-Z]\w+\s+\w+\s+\w+\s+\w+\.$/gm,
                    "synestezie": (text) => {
                        const senses = {
                            sight: /\b(barva|vidát|jasnû§|temnû§|svátlû§|barevnû§)\b/gi,
                            sound: /\b(zvuk|slyéÀet|hlasitû§|ticho|hluk)\b/gi,
                            touch: /\b(hladkû§|tvrdû§|mákkû§|teplû§|studenû§)\b/gi
                        };
                        let count = 0;
                        const keys = Object.keys(senses);
                        for (let i = 0; i < keys.length; i++) {
                            for (let j = i + 1; j < keys.length; j++) {
                                if (senses[keys[i]].test(text) && senses[keys[j]].test(text)) {
                                    count++;
                                }
                            }
                        }
                        return count > 0;
                    }
                },
                macroPatterns: {
                    "nelogiánost": (text) => {
                        return /\b(protoéƒe|takéƒe)\s+\w+\s+\w+\s+\w+\s+[a-z]/gi.test(text);
                    }
                }
            },
            {
                id: 11,
                name: "Surrealistickû§",
                degree: 330,
                color: "#D7BDE2",
                microFigures: {
                    "anakolut": /[A-Z].*?\.{3}.*?\./g,
                    "snovû§ shluk": /(\w+),\s*(\w+),\s*(\w+),\s*(\w+)/g
                },
                macroPatterns: {
                    "snovûÀ logika": (text) => {
                        const nouns = (text.match(/\b[A-Z]\w+\b/g) || []).length;
                        const verbs = (text.match(/\b(je|jsou|byl|byla|bylo|byly)\b/gi) || []).length;
                        return nouns > verbs * 2;
                    }
                }
            }
        ];

        // Analû§za textu
        function analyzeText() {
            const text = document.getElementById('textInput').value;
            if (!text.trim()) {
                alert('ProsûÙm, vloéƒte text k analû§ze.');
                return;
            }

            const results = {};
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);

            // Inicializace vû§sledké₤
            angles.forEach(angle => {
                results[angle.id] = {
                    name: angle.name,
                    degree: angle.degree,
                    color: angle.color,
                    activatedSentences: 0,
                    totalSentences: sentences.length
                };
            });

            // Vátnû§ skener (Mikro)
            sentences.forEach(sentence => {
                angles.forEach(angle => {
                    let activated = false;

                    // Kontrola mikro-figur
                    for (const [figureType, pattern] of Object.entries(angle.microFigures)) {
                        if (typeof pattern === 'function') {
                            if (pattern(sentence) > 0) {
                                activated = true;
                                break;
                            }
                        } else if (pattern.test(sentence)) {
                            activated = true;
                            break;
                        }
                    }

                    if (activated) {
                        results[angle.id].activatedSentences++;
                    }
                });
            });

            // StrukturûÀlnûÙ skener (Makro)
            angles.forEach(angle => {
                for (const [patternType, pattern] of Object.entries(angle.macroPatterns)) {
                    if (pattern(text)) {
                        // Makro-figura zvyéÀuje sytost o 20%
                        results[angle.id].activatedSentences += Math.ceil(sentences.length * 0.2);
                        break;
                    }
                }
            });

            // Vû§poáet procent
            angles.forEach(angle => {
                const saturation = Math.min(100, Math.round((results[angle.id].activatedSentences / results[angle.id].totalSentences) * 100));
                results[angle.id].saturation = saturation;
            });

            // ZobrazenûÙ vû§sledké₤
            displayResults(results);

            // UloéƒenûÙ do localStorage
            saveAnalysis(text, results);
        }

        // ZobrazenûÙ vû§sledké₤
        function displayResults(results) {
            const anglesList = document.getElementById('anglesList');
            anglesList.innerHTML = '';

            angles.forEach((angle, index) => {
                const saturation = results[angle.id].saturation;
                const item = document.createElement('div');
                item.className = `angle-item angle-color-${index}`;
                item.innerHTML = `
                    <div class="angle-name">${angle.degree}ô¯ ${angle.name}</div>
                    <div class="angle-bar">
                        <div class="angle-fill" style="width: ${saturation}%; background: ${angle.color};">
                            ${saturation}%
                        </div>
                    </div>
                `;
                anglesList.appendChild(item);
            });

            // KreslenûÙ radarovûˋho grafu
            drawRadarChart(results);
        }

        // KreslenûÙ radarovûˋho grafu
        function drawRadarChart(results) {
            const canvas = document.getElementById('radarChart');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) - 40;

            // Vyáistit plûÀtno
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // KreslenûÙ méûÙéƒky
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            for (let i = 1; i <= 5; i++) {
                const r = (radius / 5) * i;
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
            }

            // KreslenûÙ os
            angles.forEach((angle, index) => {
                const rad = (angle.degree * Math.PI) / 180;
                const x = centerX + Math.cos(rad - Math.PI / 2) * radius;
                const y = centerY + Math.sin(rad - Math.PI / 2) * radius;

                ctx.strokeStyle = '#ddd';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x, y);
                ctx.stroke();

                // Popis û¤hlu
                ctx.fillStyle = '#333';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const labelX = centerX + Math.cos(rad - Math.PI / 2) * (radius + 30);
                const labelY = centerY + Math.sin(rad - Math.PI / 2) * (radius + 30);
                ctx.fillText(angle.name, labelX, labelY);
            });

            // KreslenûÙ dat
            ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            ctx.beginPath();

            angles.forEach((angle, index) => {
                const saturation = results[angle.id].saturation;
                const rad = (angle.degree * Math.PI) / 180;
                const dataRadius = (saturation / 100) * radius;
                const x = centerX + Math.cos(rad - Math.PI / 2) * dataRadius;
                const y = centerY + Math.sin(rad - Math.PI / 2) * dataRadius;

                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });

            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // KreslenûÙ bodé₤
            angles.forEach((angle, index) => {
                const saturation = results[angle.id].saturation;
                const rad = (angle.degree * Math.PI) / 180;
                const dataRadius = (saturation / 100) * radius;
                const x = centerX + Math.cos(rad - Math.PI / 2) * dataRadius;
                const y = centerY + Math.sin(rad - Math.PI / 2) * dataRadius;

                ctx.fillStyle = angle.color;
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // UloéƒenûÙ analû§zy
        function saveAnalysis(text, results) {
            const analysis = {
                timestamp: new Date().toISOString(),
                text: text,
                results: results
            };

            let analyses = JSON.parse(localStorage.getItem('analyses') || '[]');
            analyses.push(analysis);
            localStorage.setItem('analyses', JSON.stringify(analyses));
        }

        // VymazûÀnûÙ
        function clearAll() {
            document.getElementById('textInput').value = '';
            document.getElementById('anglesList').innerHTML = '';
            const canvas = document.getElementById('radarChart');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Inicializace canvasu
        window.addEventListener('load', () => {
            const canvas = document.getElementById('radarChart');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        });
    </script>
</body>
</html>
